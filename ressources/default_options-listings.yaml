from: markdown+autolink_bare_uris+tex_math_single_backslash
# reader: may be used instead of from:
to: docx+native_numbering+styles
# writer: may be used instead of to:

# Example defaults YAML for the listings companion document. Paths are
# placeholders -- edit to match your project.

# leave blank for output to stdout:
output-file: /path/to/project/output_word/report-listings.docx

# leave blank for input from stdin, use [] for no input:
input-files:
- /path/to/project/input_md/header-listings.txt
- /path/to/project/output_md/report-listings.txt
# or use `input-file:` with a single value

filters:
- /path/to/project/input_md/page-orientation.lua

# refer to https://pandoc.org/MANUAL.html#default-files for the full list
