from: markdown+autolink_bare_uris+tex_math_single_backslash+grid_tables+multiline_tables
# reader: may be used instead of from:
to: docx+native_numbering+styles
# writer: may be used instead of to:

# Full example; paths are placeholders -- edit to match your project.
# In practice `knit' auto-generates a YAML like this from its options,
# so you only need this file if you want a specific pandoc configuration
# that the auto-generated one does not cover.

# leave blank for output to stdout:
output-file: /path/to/project/output_word/report.docx

# leave blank for input from stdin, use [] for no input:
input-files:
- /path/to/project/input_md/header.txt
- /path/to/project/output_md/report.txt
# or use `input-file:` with a single value

filters:
- /path/to/project/input_md/page-orientation.lua
- /path/to/project/input_md/table-breaks.lua

table-of-contents: true
number-sections: true

# refer to https://pandoc.org/MANUAL.html#default-files for the full list
